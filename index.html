<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Трекер подписок</title>
  <style>
    body {
      font-family: Arial;
      max-width: 600px;
      margin: auto;
      background: #111;
      color: #fff;
    }
    input, button {
      padding: 10px;
      margin: 5px;
    }
    .card {
      border: 1px solid #444;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<h2>📊 Подписки</h2>

<input id="name" placeholder="Название (Netflix)">
<input id="price" type="number" placeholder="Цена">
<input id="date" type="date">
<button onclick="addSub()">Добавить</button>

<h3>Список</h3>
<div id="list"></div>

<h3>Итого в месяц: <span id="total">0</span> ₽</h3>

<script>
let subs = JSON.parse(localStorage.getItem("subs")) || [];

function save() {
  localStorage.setItem("subs", JSON.stringify(subs));
}

function addSub() {
  const name = document.getElementById("name").value;
  const price = +document.getElementById("price").value;
  const date = document.getElementById("date").value;

  if (!name || !price || !date) return alert("Заполни все поля");

  subs.push({ name, price, date });
  save();
  render();
}

function removeSub(index) {
  subs.splice(index, 1);
  save();
  render();
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  let total = 0;

  subs.forEach((s, i) => {
    total += s.price;

    const el = document.createElement("div");
    el.className = "card";
    el.innerHTML = `
      <b>${s.name}</b><br>
      ${s.price} ₽<br>
      Следующее списание: ${s.date}<br>
      <button onclick="removeSub(${i})">Удалить</button>
    `;
    list.appendChild(el);
  });

  document.getElementById("total").innerText = total;
}

render();
</script>

</body>
</html>
